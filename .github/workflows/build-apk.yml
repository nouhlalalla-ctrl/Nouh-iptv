name: Build APK TV
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        working-directory: nouh-android-tv
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: nouh-android-tv
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NOUH-IPTV-TV
          path: nouh-android-tv/app/build/outputs/apk/debug/*.apk
